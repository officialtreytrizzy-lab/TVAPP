name: Eraser GPU Contract

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eraser-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check eraser GPU contract
        run: npm run check:eraser-contract
