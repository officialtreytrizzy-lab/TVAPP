name: Platform Contracts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check locked contracts
        run: npm run check:contracts

      - name: Compile eraser Python entrypoints
        run: |
          python -m py_compile \
            gpu-worker/pipelines/optical_flow_vace_inpaint.py \
            gpu-worker/pipelines/sam2_propainter.py \
            gpu-worker/pipelines/sam2_propainter_resilient.py \
            gpu-worker/pipelines/sam2_propainter_verified.py \
            gpu-worker/main.py \
            gpu-worker/modal_app.py

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg


      - name: Install eraser test dependencies
        run: python -m pip install numpy==2.1.3 opencv-python-headless==4.10.0.84

      - name: Verify optical-flow VACE pipeline
        run: python scripts/verify_optical_flow_vace_pipeline.py

      - name: Verify SAM2 + ProPainter timeline safeguards
        run: python scripts/verify_etreyser_timeline.py
