name: Consolidate Vercel Functions

on:
  push:
    branches:
      - fix/vercel-function-limit

permissions:
  contents: write

jobs:
  consolidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/vercel-function-limit
      - name: Consolidate API routes
        run: python scripts/consolidate-vercel-functions.py
      - name: Verify contracts
        run: npm run check:contracts
      - name: Commit consolidated routes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Consolidate Vercel API functions"
          git push origin HEAD:fix/vercel-function-limit
