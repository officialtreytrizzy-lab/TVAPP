name: Deploy Modal GPU Worker

on:
  push:
    branches:
      - main
    paths:
      - "gpu-worker/**"
      - ".github/workflows/deploy-modal-gpu.yml"
  pull_request:
    branches:
      - main
    paths:
      - "gpu-worker/**"
      - ".github/workflows/deploy-modal-gpu.yml"
  workflow_dispatch:

concurrency:
  group: tvapp-modal-gpu-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name != 'pull_request' || github.head_ref == 'ops/modal-gpu-deploy'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Modal CLI
        run: python -m pip install --upgrade modal

      - name: Check MODAL_TOKEN_ID
        continue-on-error: true
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
        run: test -n "$MODAL_TOKEN_ID"

      - name: Check MODAL_TOKEN_SECRET
        continue-on-error: true
        env:
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: test -n "$MODAL_TOKEN_SECRET"

      - name: Verify Modal credentials
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          test -n "$MODAL_TOKEN_ID" || (echo "Missing repository secret MODAL_TOKEN_ID" && exit 1)
          test -n "$MODAL_TOKEN_SECRET" || (echo "Missing repository secret MODAL_TOKEN_SECRET" && exit 1)
          modal token info

      - name: Deploy A10G worker
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal deploy gpu-worker/modal_app.py
